# nginx-config voor de statische bedrijfsgezondheidscan.
# Serveert public/ als kale, build-loze site. Geen backend, alleen statics.

server {
    listen       80;
    server_name  _;

    # Web root: hier landt de inhoud van public/ (zie Dockerfile).
    root   /usr/share/nginx/html;
    index  index.html;

    # Standaard tekst-charset op utf-8 (NL-teksten met accenten).
    charset       utf-8;
    charset_types text/css text/plain application/json image/svg+xml application/javascript;

    # Zorg dat .json als application/json wordt geserveerd (config-bestanden + fetch()).
    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js mjs;
        application/json                      json;
        image/svg+xml                         svg svgz;
        font/woff2                            woff2;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/webp                            webp;
        image/x-icon                          ico;
    }
    default_type  application/octet-stream;

    # gzip aan voor tekstuele assets (css/js/json/svg). woff2 is al gecomprimeerd.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   256;
    gzip_comp_level   6;
    gzip_types        text/plain
                      text/css
                      application/javascript
                      application/json
                      image/svg+xml;

    # Lange cache voor versie-vaste assets (css/js/img/fonts hebben hashed namen).
    location /assets/ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
    }

    # woff2-fonts: lange cache, immutable.
    location ~* \.woff2$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
    }

    # Config-JSON: GEEN cache, zodat content-edits (questions/content/settings) direct live gaan.
    location /config/ {
        add_header  Cache-Control "no-cache, no-store, must-revalidate";
        expires     off;
    }

    # index.html: GEEN cache, zodat een nieuwe deploy meteen zichtbaar is.
    location = /index.html {
        add_header  Cache-Control "no-cache, no-store, must-revalidate";
        expires     off;
    }

    # Eén-pagina-site: alles valt terug op index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
